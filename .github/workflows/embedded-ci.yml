name: ARM64 Embedded Linux CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qemu-system-aarch64 \
          gcc-aarch64-linux-gnu \
          python3 \
          wget bc flex bison \
          libssl-dev libncurses-dev

    - name: Build ARM64 kernel
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.1.tar.xz
        tar xf linux-6.1.tar.xz
        cd linux-6.1
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
        scripts/config --disable CONFIG_KVM
        scripts/config --disable CONFIG_KVM_ARM_HOST
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j2 Image
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

    - name: Build kernel module
      run: |
        cd module_src && make

    - name: Build BusyBox rootfs
      run: |
        wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
        tar xf busybox-1.36.1.tar.bz2
        cd busybox-1.36.1
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
        sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
        sed -i 's/CONFIG_TC=y/# CONFIG_TC is not set/' .config
        yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- oldconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j2
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- install

    - name: Assemble rootfs image
      run: |
        mkdir -p rootfs
        cp -a busybox-1.36.1/_install/* rootfs/
        mkdir -p rootfs/{proc,sys,dev,etc,lib,tmp,root,modules}
        cp rootfs_files/init rootfs/init
        chmod +x rootfs/init
        cp module_src/hello_arm64.ko rootfs/modules/
        dd if=/dev/zero of=rootfs.img bs=1M count=64
        mkfs.ext4 rootfs.img
        mkdir -p mnt
        sudo mount rootfs.img mnt/
        sudo cp -a rootfs/* mnt/
        sudo umount mnt/

    - name: Run embedded Linux tests
      run: |
        chmod +x run_tests.sh
        ./run_tests.sh

    - name: Upload test log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qemu-test-log
        path: /tmp/qemu_output.log
